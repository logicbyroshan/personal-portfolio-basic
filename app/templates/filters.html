{% load static %}

<!-- Enhanced Filters Component -->
<div class="filters-container">
    <!-- Search Bar -->
    <div class="search-section">
        <form method="GET" class="search-form">
            <div class="search-input-wrapper">
                <input type="text" 
                       name="search" 
                       placeholder="Search content..." 
                       value="{{ query|default:'' }}"
                       class="search-input">
                <input type="hidden" name="category" value="{{ selected_category }}">
                <input type="hidden" name="sort" value="{{ sort }}">
                
                {% if query %}
                    <button type="button" class="clear-search-btn" onclick="clearSearch()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                {% endif %}
                
                <button type="submit" class="search-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                        <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <!-- Filters Row -->
    <div class="filters-row">
        <!-- Categories -->
        <div class="categories-section">
            <div class="category-pills">
                <a href="?{% if query %}search={{ query }}&{% endif %}{% if sort %}sort={{ sort }}&{% endif %}" 
                   class="category-pill {% if not selected_category %}active{% endif %}">
                    All
                </a>
                {% for cat in category_list %}
                    <a href="?{% if query %}search={{ query }}&{% endif %}{% if sort %}sort={{ sort }}&{% endif %}category={{ cat }}" 
                       class="category-pill {% if cat == selected_category %}active{% endif %}">
                        {{ cat }}
                    </a>
                {% endfor %}
            </div>
        </div>

        <!-- Sort Dropdown -->
        <div class="sort-section">
            <div class="sort-dropdown">
                <button type="button" class="sort-btn" onclick="toggleSortDropdown()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 6h18M7 12h10m-7 6h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Sort
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="dropdown-arrow">
                        <polyline points="6,9 12,15 18,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                
                <div class="sort-dropdown-menu" id="sortDropdown">
                    <div class="sort-options">
                        <a href="?{% if query %}search={{ query }}&{% endif %}{% if selected_category %}category={{ selected_category }}&{% endif %}sort=latest" 
                           class="sort-option {% if sort == 'latest' or not sort %}active{% endif %}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <polyline points="22,12 18,8 18,11 2,11 2,13 18,13 18,16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Latest First
                        </a>
                        
                        <a href="?{% if query %}search={{ query }}&{% endif %}{% if selected_category %}category={{ selected_category }}&{% endif %}sort=oldest" 
                           class="sort-option {% if sort == 'oldest' %}active{% endif %}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <polyline points="2,12 6,8 6,11 22,11 22,13 6,13 6,16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Oldest First
                        </a>

                        {% if 'skills' in request.resolver_match.url_name %}
                        <div class="sort-divider"></div>
                        
                        <a href="?{% if query %}search={{ query }}&{% endif %}{% if selected_category %}category={{ selected_category }}&{% endif %}sort=name" 
                           class="sort-option {% if sort == 'name' %}active{% endif %}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2m0 6v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Name A-Z
                        </a>
                        
                        <a href="?{% if query %}search={{ query }}&{% endif %}{% if selected_category %}category={{ selected_category }}&{% endif %}sort=level" 
                           class="sort-option {% if sort == 'level' %}active{% endif %}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <polygon points="12,2 15.09,8.26 22,9 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9 8.91,8.26" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Skill Level
                        </a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Enhanced Filters JavaScript -->
<script>
// Sort dropdown functionality
function toggleSortDropdown() {
    const dropdown = document.getElementById('sortDropdown');
    const isVisible = dropdown.style.display === 'block';
    dropdown.style.display = isVisible ? 'none' : 'block';
    
    // Add/remove active class to button
    const sortBtn = document.querySelector('.sort-btn');
    if (isVisible) {
        sortBtn.classList.remove('active');
    } else {
        sortBtn.classList.add('active');
    }
}

// Clear search function
function clearSearch() {
    const searchInput = document.querySelector('.search-input');
    const form = document.querySelector('.search-form');
    searchInput.value = '';
    form.submit();
}

// Initialize filters
document.addEventListener('DOMContentLoaded', function() {
    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('sortDropdown');
        const sortBtn = document.querySelector('.sort-btn');
        
        if (!sortBtn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.style.display = 'none';
            sortBtn.classList.remove('active');
        }
    });

    // Search input enhancements
    const searchInput = document.querySelector('.search-input');
    if (searchInput) {
        // Auto-submit on Enter
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.target.closest('form').submit();
            }
        });

        // Focus effects
        searchInput.addEventListener('focus', function() {
            this.parentElement.classList.add('focused');
        });
        
        searchInput.addEventListener('blur', function() {
            this.parentElement.classList.remove('focused');
        });
    }

    // Category pills smooth scrolling on mobile
    const categoriesSection = document.querySelector('.category-pills');
    if (categoriesSection) {
        let isDown = false;
        let startX;
        let scrollLeft;

        categoriesSection.addEventListener('mousedown', (e) => {
            isDown = true;
            categoriesSection.classList.add('active');
            startX = e.pageX - categoriesSection.offsetLeft;
            scrollLeft = categoriesSection.scrollLeft;
        });

        categoriesSection.addEventListener('mouseleave', () => {
            isDown = false;
            categoriesSection.classList.remove('active');
        });

        categoriesSection.addEventListener('mouseup', () => {
            isDown = false;
            categoriesSection.classList.remove('active');
        });

        categoriesSection.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - categoriesSection.offsetLeft;
            const walk = (x - startX) * 2;
            categoriesSection.scrollLeft = scrollLeft - walk;
        });
    }
});
</script>

<!-- Enhanced Filters CSS -->
<style>
/* Filters Container */
.filters-container {
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
    border-radius: 20px;
    padding: 25px;
    margin: 20px 0 30px 0;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

/* Search Section */
.search-section {
    margin-bottom: 20px;
}

.search-form {
    display: flex;
    justify-content: center;
}

.search-input-wrapper {
    position: relative;
    width: 100%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50px;
    padding: 2px;
    border: 2px solid transparent;
    transition: all 0.3s ease;
    backdrop-filter: blur(20px);
}

.search-input-wrapper.focused {
    border-color: #667eea;
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
}

.search-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 15px 60px 15px 25px;
    color: var(--text-color, #ffffff);
    font-size: 16px;
    font-family: 'Roboto', sans-serif;
    border-radius: 50px;
}

.search-input::placeholder {
    color: rgba(255, 255, 255, 0.6);
    font-weight: 300;
}

.search-btn, .clear-search-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    color: white;
}

.search-btn {
    right: 5px;
}

.clear-search-btn {
    right: 50px;
    background: rgba(255, 255, 255, 0.1);
    width: 30px;
    height: 30px;
}

.search-btn:hover {
    transform: translateY(-50%) scale(1.05);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.clear-search-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-50%) scale(1.1);
}

/* Filters Row */
.filters-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
}

/* Categories Section */
.categories-section {
    flex: 1;
    min-width: 0;
}

.category-pills {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 5px 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.category-pills::-webkit-scrollbar {
    display: none;
}

.category-pill {
    display: inline-flex;
    align-items: center;
    padding: 10px 18px;
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-color, #ffffff);
    text-decoration: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
    white-space: nowrap;
    border: 2px solid transparent;
    backdrop-filter: blur(10px);
}

.category-pill:hover {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
}

.category-pill.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
}

/* Sort Section */
.sort-section {
    flex-shrink: 0;
}

.sort-dropdown {
    position: relative;
}

.sort-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-color, #ffffff);
    border: 2px solid transparent;
    border-radius: 25px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.sort-btn:hover, .sort-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
}

.sort-btn .dropdown-arrow {
    transition: transform 0.3s ease;
}

.sort-btn.active .dropdown-arrow {
    transform: rotate(180deg);
}

.sort-dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 10px;
    background: rgba(18, 18, 40, 0.95);
    border-radius: 15px;
    padding: 10px;
    min-width: 200px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 1000;
    animation: fadeInUp 0.3s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.sort-options {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.sort-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    color: var(--text-color, #ffffff);
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 400;
    transition: all 0.3s ease;
}

.sort-option:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateX(5px);
}

.sort-option.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-weight: 500;
}

.sort-option svg {
    flex-shrink: 0;
    opacity: 0.8;
}

.sort-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
    margin: 5px 0;
}

/* Filter Status Styling */
.filter-status {
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
    border-radius: 15px;
    padding: 15px 20px;
    margin: 15px 0;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
}

.filter-status p {
    margin: 0;
    color: var(--text-color, #ffffff);
    font-size: 14px;
    font-weight: 400;
}

.filter-status strong {
    color: #667eea;
    font-weight: 600;
}

.clear-filters {
    color: #667eea;
    text-decoration: none;
    margin-left: 15px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 15px;
    transition: all 0.3s ease;
    border: 1px solid transparent;
}

.clear-filters:hover {
    background: rgba(102, 126, 234, 0.1);
    border-color: rgba(102, 126, 234, 0.3);
    text-decoration: none;
}

/* No Results Styling */
.no-results {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
    border-radius: 20px;
    margin: 30px 0;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
}

.no-results h3 {
    color: var(--text-color, #ffffff);
    margin-bottom: 15px;
    font-size: 24px;
    font-weight: 600;
}

.no-results p {
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 25px;
    font-size: 16px;
    line-height: 1.5;
}

.no-results .outline-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: 2px solid transparent;
    padding: 12px 25px;
    border-radius: 25px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.no-results .outline-btn:hover {
    background: transparent;
    border-color: #667eea;
    color: #667eea;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
}

/* Responsive Design */
@media (max-width: 768px) {
    .filters-container {
        padding: 20px 15px;
        margin: 15px 0 25px 0;
    }

    .search-input-wrapper {
        max-width: 100%;
    }

    .search-input {
        padding: 12px 55px 12px 20px;
        font-size: 14px;
    }

    .search-btn, .clear-search-btn {
        width: 35px;
        height: 35px;
    }

    .clear-search-btn {
        right: 45px;
        width: 25px;
        height: 25px;
    }

    .filters-row {
        flex-direction: column;
        gap: 15px;
        align-items: stretch;
    }

    .categories-section {
        order: 1;
    }

    .sort-section {
        order: 2;
        align-self: center;
    }

    .category-pills {
        justify-content: center;
        padding: 8px 0;
    }

    .category-pill {
        padding: 8px 15px;
        font-size: 13px;
    }

    .sort-dropdown-menu {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        right: auto;
        margin-top: 0;
        max-width: 90vw;
        width: 280px;
    }

    .no-results {
        padding: 40px 15px;
    }

    .no-results h3 {
        font-size: 20px;
    }

    .filter-status {
        padding: 12px 15px;
    }

    .clear-filters {
        display: block;
        margin: 10px auto 0;
        text-align: center;
    }
}

@media (max-width: 480px) {
    .search-input {
        padding: 10px 50px 10px 15px;
        font-size: 14px;
    }

    .search-btn {
        width: 30px;
        height: 30px;
        right: 3px;
    }

    .category-pill {
        padding: 6px 12px;
        font-size: 12px;
    }

    .sort-btn {
        padding: 8px 15px;
        font-size: 13px;
    }
}
</style>
